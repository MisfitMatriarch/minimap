<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join — Misfit Architecture</title>
<link rel="stylesheet" href="/css/tokens.css">
<style>
html, body {
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  background: var(--gradient-brand);
  overflow: hidden;
}

.qr-card {
  background: var(--cream);
  border-radius: 24px;
  padding: clamp(32px, 5vw, 60px);
  text-align: center;
  box-shadow: 0 24px 80px rgba(0,0,0,0.3);
  max-width: min(480px, 90vw);
  width: 100%;
}

.qr-heading {
  font-family: var(--font-display);
  font-size: clamp(1.4rem, 3vw, 2rem);
  font-weight: 900;
  color: var(--ink);
  margin-bottom: 4px;
}

.qr-sub {
  font-family: var(--font-prose);
  font-style: italic;
  font-size: clamp(0.75rem, 1.5vw, 0.95rem);
  color: var(--muted);
  margin-bottom: clamp(20px, 3vw, 32px);
}

.qr-img-wrap {
  background: #fff;
  border-radius: 16px;
  padding: clamp(16px, 2vw, 24px);
  display: inline-block;
  margin-bottom: clamp(16px, 2vw, 24px);
  border: 2px solid var(--border);
}

.qr-img-wrap img {
  width: clamp(180px, 30vw, 280px);
  height: clamp(180px, 30vw, 280px);
  display: block;
}

.qr-url {
  font-family: var(--font-body);
  font-size: clamp(0.7rem, 1.2vw, 0.9rem);
  color: var(--pink);
  font-weight: 600;
  word-break: break-all;
  margin-bottom: 8px;
}

.qr-hint {
  font-size: clamp(0.6rem, 1vw, 0.75rem);
  color: var(--muted);
}

.qr-brand {
  margin-top: clamp(16px, 2vw, 24px);
  padding-top: clamp(12px, 1.5vw, 16px);
  border-top: 1px solid var(--border);
  font-family: var(--font-display);
  font-size: clamp(0.65rem, 1vw, 0.8rem);
  color: var(--muted);
}

.qr-brand em { color: var(--gold); font-style: italic; }
</style>
</head>
<body>

<div class="qr-card">
  <div class="qr-heading">Scan to begin</div>
  <div class="qr-sub">Your Mini Map — Misfit Architecture</div>

  <div class="qr-img-wrap">
    <img id="qr-img" src="" alt="QR code to join the session">
  </div>

  <div class="qr-url" id="qr-url"></div>
  <div class="qr-hint">Open your camera and point it at the code</div>

  <div class="qr-brand">ENOUGH — <em>Tanya Hicks</em></div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const session = urlParams.get('session') || 'LIVE';
const baseUrl = window.location.origin;
const joinUrl = `${baseUrl}/?s=${encodeURIComponent(session)}`;

document.getElementById('qr-img').src = `/api/qr?session=${encodeURIComponent(session)}`;
document.getElementById('qr-url').textContent = joinUrl;
</script>
</body>
</html>
